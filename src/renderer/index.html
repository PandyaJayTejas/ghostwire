<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GhostWire — Decentralized local network communication. No internet. No servers.">
  <title>GhostWire</title>

  <!-- Google Fonts (preloaded for faster rendering) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/design-system.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/screens.css" />
</head>
<body>
  <div id="app">
    <!-- CRT scanlines applied via ::before pseudo -->

    <!-- Ambient Grid BG -->
    <div class="ambient-bg">
      <div class="grid-overlay"></div>
    </div>

    <!-- Data Stream (right-side rain) -->
    <div class="data-stream" id="data-stream">
      <div class="data-stream-text" id="data-stream-text"></div>
    </div>

    <!-- App Layout: Sidebar + Content -->
    <div class="app-layout" id="app-layout" style="display:none">
      <!-- Sidebar Navigation -->
      <nav class="sidebar" id="sidebar"></nav>

      <!-- Screen Container -->
      <div class="screen-container" id="screen-container"></div>
    </div>

    <!-- Onboarding (shown first, outside app-layout) -->
    <div id="onboarding-container"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
